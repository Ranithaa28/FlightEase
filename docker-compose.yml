version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: flightease-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: airline_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  webapp:
    build: .
    container_name: flightease-web
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
    depends_on:
      - db
    restart: always

volumes:
  db_data:
